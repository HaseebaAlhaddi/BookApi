services:

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver

    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "YourStrong@Pass123"
      MSSQL_PID: "Express"

    ports:
      - "1433:1433"

    volumes:
      - sql_data:/var/opt/mssql

    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "YourStrong@Pass123" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  bookapi:
    build: .
    container_name: bookapi

    environment:
      ASPNETCORE_URLS: "http://+:8080"

    ports:
      - "8080:8080"

    depends_on:
      sqlserver:
        condition: service_healthy

volumes:
  sql_data: